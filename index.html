<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Texture Painter</title>
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <div id="ui-panel">
      <label for="toolMode">Tool</label>
      <select id="toolMode">
        <option value="paint">Paint</option>
        <option value="finger">Finger</option>
      </select>

      <label for="brushType">Brush Style</label>
      <select id="brushType">
        <option value="soft">Soft Brush</option>
        <option value="hardbrush">Hard Brush</option>
        <option value="spray">Spray Paint</option>
      </select>

      <label for="colorPicker">Brush Color</label>
      <input type="color" id="colorPicker" value="#00aaff" />

      <label for="brushSize">Brush Size</label>
      <input type="range" id="brushSize" min="5" max="100" value="30" />
      <span id="brushSizeValue">30</span>

      <label for="opacity">Opacity</label>
      <input type="range" id="opacity" min="0" max="100" value="100" />
      <span id="brushOpacityValue">100</span>

      <div id="texture-buttons">
        <button id="applyBrickBtn" class="texture-button" title="Brick Texture">
          <img src="./src/assets/brick.jpg" alt="Brick texture" />
        </button>
        <button id="applyFabricBtn" class="texture-button" title="Fabric Stripes Texture">
          <img src="./src/assets/fabric-stripes.jpg" alt="Fabric stripes texture" />
        </button>
      </div>
    </div>

    <canvas id="canvas"></canvas>
  </body>
</html>
